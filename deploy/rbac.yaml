# RBAC for the Vector controller.
# Grants the vector ServiceAccount read-only access to KumaMonitor resources
# and — when discovery is enabled — to Namespaces, Ingresses, Services,
# Deployments, and StatefulSets.  No write permissions are required in v1.
---
apiVersion: v1
kind: Namespace
metadata:
  name: vector

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: vector

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector
rules:
  - apiGroups:
      - vector.beejeex.github.io
    resources:
      - kumamonitors
    verbs:
      - get
      - list
      - watch
  # Discovery: namespace opt-in annotation
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  # Discovery: Service port heuristics and database port detection
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
  # Discovery: Ingress host rules
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  # Discovery: liveness/readiness probe extraction
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: vector
