# RBAC for the Vector controller.
# Grants the vector ServiceAccount read-only access to KumaMonitor resources
# across all namespaces.  No write permissions are required in v1.
---
apiVersion: v1
kind: Namespace
metadata:
  name: vector

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: vector

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector
rules:
  - apiGroups:
      - monitoring.monitoring.example.com
    resources:
      - kumamonitors
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: vector
