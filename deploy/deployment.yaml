# Vector controller Deployment.
# Prerequisites:
#   kubectl apply -f deploy/crd.yaml
#   kubectl apply -f deploy/rbac.yaml
#   kubectl apply -f deploy/secret.yaml   # copy of secret-example.yaml, filled in
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  namespace: vector
  labels:
    app: vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: vector
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: vector
          image: ghcr.io/beejeex/vector:v0.0.12
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: KUMA_URL
              valueFrom:
                secretKeyRef:
                  name: vector-credentials
                  key: KUMA_URL
            - name: KUMA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vector-credentials
                  key: KUMA_USERNAME
            - name: KUMA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vector-credentials
                  key: KUMA_PASSWORD
            - name: RECONCILE_INTERVAL
              value: "60"
            - name: LOG_LEVEL
              value: "INFO"
            - name: VECTOR_SQLITE_PATH
              value: "/data/vector.db"
            # Discovery — set DISCOVERY_ENABLED to "true" and annotate namespaces to opt in.
            # See README for full documentation.
            - name: DISCOVERY_ENABLED
              value: "false"
            # - name: DISCOVERY_INGRESS
            #   value: "true"
            # - name: DISCOVERY_SERVICES
            #   value: "true"
            # - name: DISCOVERY_PROBES
            #   value: "true"
            # - name: DISCOVERY_DATABASES
            #   value: "true"
            # - name: DISCOVERY_INGRESS_DEFAULT_SCHEME
            #   value: "https"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            # The main loop touches /tmp/healthy after every reconcile cycle.
            # If the file is older than 3× the reconcile interval the loop is stuck.
            exec:
              command:
                - /bin/sh
                - -c
                - find /tmp/healthy -mmin -3
            initialDelaySeconds: 120
            periodSeconds: 60
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        # For production, replace emptyDir with a PersistentVolumeClaim so the
        # SQLite trace log survives pod restarts.  The controller recovers
        # correctly from an empty or missing SQLite file, so emptyDir is safe.
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
