# Credentials secret for the Vector controller.
#
# Authentication modes (choose one):
#
#   Option A — username/password (KUMA_USERNAME + KUMA_PASSWORD)
#   Option B — API key          (KUMA_API_TOKEN)
#   Option C — auth disabled    (omit all credential fields; only KUMA_URL needed)
#
# Usage:
#   cp docs/secret.yaml deploy/secret.yaml
#   # Edit deploy/secret.yaml with real values
#   kubectl apply -f deploy/secret.yaml
#
# Security: NEVER commit secret.yaml to version control.
# Use Sealed Secrets or External Secrets Operator for GitOps-safe management.
apiVersion: v1
kind: Secret
metadata:
  name: vector-credentials
  namespace: vector
type: Opaque
stringData:
  KUMA_URL: "https://uptime-kuma.example.com"
  # Option A: username/password
  KUMA_USERNAME: "admin"
  KUMA_PASSWORD: "changeme"
  # Option B: API key (comment out Option A and uncomment this)
  # KUMA_API_TOKEN: "uk1_xxxxxxxxxxxxxxxxxxxx"
