# Credentials secret for the Vector controller.
#
# Usage:
#   cp deploy/secret-example.yaml deploy/secret.yaml
#   # Edit deploy/secret.yaml with real values
#   kubectl apply -f deploy/secret.yaml
#
# Security: NEVER commit secret.yaml to version control.
# Use Sealed Secrets or External Secrets Operator for GitOps-safe management.
apiVersion: v1
kind: Secret
metadata:
  name: vector-credentials
  namespace: vector
type: Opaque
stringData:
  KUMA_URL: "https://uptime-kuma.example.com"
  KUMA_USERNAME: "admin"
  KUMA_PASSWORD: "changeme"
