# Credentials secret — Vector controller
#
# This is a template. Never commit real credentials to version control.
# For GitOps-safe management use Sealed Secrets or External Secrets Operator.
#
# Authentication modes (choose one):
#
#   Option A — username/password (KUMA_USERNAME + KUMA_PASSWORD)
#   Option B — API key          (KUMA_API_TOKEN)
#   Option C — auth disabled    (omit all credential fields)
#
# Apply with:
#   kubectl apply -f deploy/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: vector-credentials
  namespace: vector
type: Opaque
stringData:
  KUMA_URL: "https://uptime-kuma.example.com"
  # Option A: username/password
  KUMA_USERNAME: "admin"
  KUMA_PASSWORD: "changeme"
  # Option B: API key (comment out Option A and uncomment this)
  # KUMA_API_TOKEN: "uk1_xxxxxxxxxxxxxxxxxxxx"
