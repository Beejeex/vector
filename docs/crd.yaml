apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kumamonitors.monitoring.monitoring.example.com
spec:
  group: monitoring.monitoring.example.com
  names:
    kind: KumaMonitor
    listKind: KumaMonitorList
    plural: kumamonitors
    singular: kumamonitor
    shortNames:
      - km
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - name
                - type
              properties:

                # ── Core ────────────────────────────────────────────────────
                name:
                  type: string
                  description: Display name for the monitor in Uptime Kuma.

                type:
                  type: string
                  description: >
                    Monitor type. Common: http, keyword, json-query, ping, port (TCP),
                    dns, push. Extended: grpc-keyword, docker, mqtt, kafka-producer,
                    postgres, mysql, sqlserver, mongodb, redis, radius, real-browser,
                    steam, gamedig, tailscale-ping, group.
                  enum:
                    - http
                    - keyword
                    - json-query
                    - grpc-keyword
                    - dns
                    - docker
                    - real-browser
                    - push
                    - steam
                    - gamedig
                    - mqtt
                    - kafka-producer
                    - sqlserver
                    - postgres
                    - mysql
                    - mongodb
                    - radius
                    - redis
                    - tailscale-ping
                    - port
                    - ping
                    - group

                url:
                  type: string
                  description: >
                    Target URL or address. Required for http, keyword, json-query,
                    ping, port, dns, and mqtt monitors. For ping/port/dns the value
                    is used as hostname when hostname is not set. Omit for group and
                    push monitors (push URLs are auto-generated by Uptime Kuma).

                description:
                  type: string
                  description: Optional description shown in Uptime Kuma.

                # ── Timing ──────────────────────────────────────────────────
                interval:
                  type: integer
                  description: Heartbeat check interval in seconds.
                  default: 60
                  minimum: 20

                timeout:
                  type: integer
                  description: Request timeout in seconds before marking the check as failed.
                  default: 30
                  minimum: 1

                retry_interval:
                  type: integer
                  description: Interval in seconds between retries after a failed check.
                  default: 60
                  minimum: 20

                resend_interval:
                  type: integer
                  description: >
                    Resend notification after this many consecutive failures (0 = disabled).
                  default: 0
                  minimum: 0

                retries:
                  type: integer
                  description: Max retries before the monitor is marked DOWN and a notification is sent.
                  default: 1
                  minimum: 0

                # ── Behaviour ───────────────────────────────────────────────
                enabled:
                  type: boolean
                  description: Whether the monitor is active. false = paused.
                  default: true

                maintenance:
                  type: boolean
                  description: Put the monitor into maintenance mode.
                  default: false

                upside_down:
                  type: boolean
                  description: Upside-Down mode — treat UP as DOWN and DOWN as UP.
                  default: false

                expiry_notification:
                  type: boolean
                  description: Send notification before TLS certificate expiry.
                  default: false

                # ── HTTP ────────────────────────────────────────────────────
                method:
                  type: string
                  description: HTTP method (http, keyword, json-query monitors).
                  default: GET
                  enum:
                    - GET
                    - POST
                    - PUT
                    - PATCH
                    - DELETE
                    - HEAD

                headers:
                  type: object
                  description: Additional HTTP request headers as key/value pairs.
                  additionalProperties:
                    type: string

                body:
                  type: string
                  description: HTTP request body for POST/PUT/PATCH.

                http_body_encoding:
                  type: string
                  description: Encoding format of the request body.
                  enum:
                    - json
                    - form
                    - xml

                max_redirects:
                  type: integer
                  description: Maximum HTTP redirects to follow.
                  default: 10
                  minimum: 0

                accepted_statuscodes:
                  type: array
                  description: >
                    Accepted HTTP status codes or ranges, e.g. "200-299", "404".
                    Defaults to ["200-299"] when omitted.
                  items:
                    type: string

                ignore_tls:
                  type: boolean
                  description: Ignore TLS/SSL certificate errors for HTTPS targets.
                  default: false

                cache_bust:
                  type: boolean
                  description: Append a random query parameter to the URL to bypass caches.
                  default: false

                ip_family:
                  type: string
                  description: IP address family to prefer for outbound requests.
                  enum:
                    - ipv4
                    - ipv6
                    - auto

                # ── Authentication ───────────────────────────────────────────
                auth_method:
                  type: string
                  description: >
                    HTTP authentication method. Leave empty for none.
                    Options: basic, ntlm, mtls, oauth2-cc.
                  enum:
                    - ""
                    - basic
                    - ntlm
                    - mtls
                    - oauth2-cc

                basic_auth_user:
                  type: string
                  description: Username for Basic or NTLM authentication.

                basic_auth_pass:
                  type: string
                  description: Password for Basic or NTLM authentication.

                auth_domain:
                  type: string
                  description: Windows domain for NTLM authentication.

                auth_workstation:
                  type: string
                  description: Workstation name for NTLM authentication.

                oauth_client_id:
                  type: string
                  description: OAuth2 client ID (oauth2-cc auth method).

                oauth_client_secret:
                  type: string
                  description: OAuth2 client secret (oauth2-cc auth method).

                oauth_token_url:
                  type: string
                  description: OAuth2 token endpoint URL.

                oauth_scopes:
                  type: string
                  description: OAuth2 scopes, space-separated.

                oauth_audience:
                  type: string
                  description: OAuth2 audience parameter.

                oauth_auth_method:
                  type: string
                  description: How to send OAuth2 credentials to the token endpoint.
                  enum:
                    - client_secret_basic
                    - client_secret_post

                tls_cert:
                  type: string
                  description: PEM-encoded client certificate for mTLS.

                tls_key:
                  type: string
                  description: PEM-encoded client private key for mTLS.

                tls_ca:
                  type: string
                  description: PEM-encoded CA certificate to trust.

                # ── Keyword / JSON-query ─────────────────────────────────────
                keyword:
                  type: string
                  description: >
                    String to search for in the response body (keyword monitor) or
                    gRPC response (grpc-keyword monitor). Case-sensitive.

                invert_keyword:
                  type: boolean
                  description: >
                    Invert keyword logic — monitor is UP when the keyword is absent.
                  default: false

                json_path:
                  type: string
                  description: JSONPath expression to evaluate against the response (json-query monitor).

                json_path_operator:
                  type: string
                  description: Comparison operator for the JSONPath result.
                  enum:
                    - contains
                    - not_contains
                    - equals
                    - not_equals
                    - less_than
                    - greater_than

                expected_value:
                  type: string
                  description: Expected value for json_path_operator comparison.

                # ── Hostname / Port ──────────────────────────────────────────
                hostname:
                  type: string
                  description: >
                    Explicit hostname or IP address for port (TCP), ping, dns, and
                    radius monitors. When absent, the url field value is used.

                port:
                  type: integer
                  description: >
                    TCP port to connect to (port/tcp monitors), DNS port (default 53),
                    or RADIUS port (default 1812).
                  minimum: 1
                  maximum: 65535

                packet_size:
                  type: integer
                  description: ICMP packet payload size in bytes for ping monitors.
                  default: 56

                # ── DNS ──────────────────────────────────────────────────────
                dns_resolve_type:
                  type: string
                  description: DNS resource record type to query.
                  default: A
                  enum:
                    - A
                    - AAAA
                    - CAA
                    - CNAME
                    - MX
                    - NS
                    - PTR
                    - SOA
                    - SRV
                    - TXT

                dns_resolve_server:
                  type: string
                  description: DNS resolver address. Defaults to 1.1.1.1.

                # ── Docker ───────────────────────────────────────────────────
                docker_container:
                  type: string
                  description: Docker container name or ID to monitor.

                docker_host:
                  type: string
                  description: Name of the Docker Host configured in Uptime Kuma.

                # ── MQTT ─────────────────────────────────────────────────────
                mqtt_topic:
                  type: string
                  description: MQTT topic to subscribe to.

                mqtt_username:
                  type: string
                  description: MQTT broker username.

                mqtt_password:
                  type: string
                  description: MQTT broker password.

                mqtt_success_message:
                  type: string
                  description: Expected message payload on the topic to consider the check successful.

                # ── Database ─────────────────────────────────────────────────
                database_connection_string:
                  type: string
                  description: >
                    Connection string for postgres, mysql, sqlserver, mongodb, or redis monitors.
                    Format varies by type (e.g. postgres://user:pass@host:5432/db).

                database_query:
                  type: string
                  description: SQL or query to execute. Used for postgres, mysql, and sqlserver monitors.

                # ── Kafka Producer ───────────────────────────────────────────
                kafka_producer_brokers:
                  type: array
                  description: List of Kafka broker addresses in host:port format.
                  items:
                    type: string

                kafka_producer_topic:
                  type: string
                  description: Kafka topic to produce a test message to.

                kafka_producer_message:
                  type: string
                  description: Kafka message payload to send.

                kafka_producer_ssl:
                  type: boolean
                  description: Enable SSL/TLS for the Kafka connection.
                  default: false

                kafka_producer_allow_auto_topic_creation:
                  type: boolean
                  description: Allow Kafka to create the topic automatically if it does not exist.
                  default: false

                # ── gRPC ─────────────────────────────────────────────────────
                grpc_url:
                  type: string
                  description: gRPC server URL, e.g. grpc://host:50051.

                grpc_protobuf:
                  type: string
                  description: Protobuf definition (.proto content) for the gRPC call.

                grpc_body:
                  type: string
                  description: JSON request body for the gRPC method call.

                grpc_metadata:
                  type: string
                  description: JSON metadata headers to send with the gRPC call.

                grpc_method:
                  type: string
                  description: gRPC method name to invoke.

                grpc_service_name:
                  type: string
                  description: gRPC service name.

                grpc_enable_tls:
                  type: boolean
                  description: Enable TLS for the gRPC connection.
                  default: false

                # ── Radius ───────────────────────────────────────────────────
                radius_username:
                  type: string
                  description: RADIUS username to authenticate with.

                radius_password:
                  type: string
                  description: RADIUS password.

                radius_called_station_id:
                  type: string
                  description: RADIUS Called-Station-Id attribute (identifier of the target device).

                radius_calling_station_id:
                  type: string
                  description: RADIUS Calling-Station-Id attribute (identifier of the probe device).

                radius_secret:
                  type: string
                  description: Shared RADIUS secret between client and server.

                # ── Grouping ─────────────────────────────────────────────────
                group:
                  type: string
                  description: >
                    Name of the parent group monitor in Uptime Kuma to nest this monitor under.

                parent_name:
                  type: string
                  description: Alias for group.

                # ── Tags & Notifications ──────────────────────────────────────
                tags:
                  type: array
                  description: Tags to attach to the monitor in Uptime Kuma.
                  items:
                    type: string

                notification_names:
                  type: array
                  description: Names of Uptime Kuma notification channels to attach.
                  items:
                    type: string
